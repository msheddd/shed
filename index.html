<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linton Men Shed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">Linton Men Shed</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About Us</a></li> <li><a href="#">Projects</a></li>
                <li class="call-us">Call us</li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="hero-banner">
            <img src="banner.jpg" alt="Linton Men Shed Banner">
            <div class="banner-text">Welcome to the Shed</div>
        </section>

        <section class="photo-grid">
            <div class="photo-card">
                <img src="photo1.jpg" alt="Project 1">
                <p>Our Workshop</p>
            </div>
            <div class="photo-card">
                <img src="photo2.jpg" alt="Project 2">
                <p>Community Events</p>
            </div>
            <div class="photo-card">
                <img src="photo3.jpg" alt="Project 3">
                <p>Latest Projects</p>
            </div>
        </section>

        <section class="contact-info">
            <h3>Get in Touch</h3>
            <p><strong>Phone:</strong> 0400 000 000</p>
            <p><strong>Email:</strong> info@lintonmenshed.org.au</p>
            <p><strong>Address:</strong> 123 Main St, Linton</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
